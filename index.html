<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Presencia Comercial - Metros y Ferrocarriles</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        .slide {
            background: white;
            width: 1120px;
            height: 630px;
            padding: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        .header {
            border-bottom: 3px solid #003366;
            padding-bottom: 15px;
            margin-bottom: 35px;
        }
        .header h1 {
            font-size: 26px;
            color: #003366;
            margin: 0;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            flex-grow: 1;
        }
        .card {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .logo-container {
            width: 120px;
            height: 65px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .name { font-size: 14px; font-weight: bold; color: #222; }
        .loc { font-size: 11px; color: #666; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

<div class="slide">
    <div class="header">
        <h1>Presencia Comercial: Proyectos de Metros y Ferrocarriles en Norteamérica</h1>
    </div>

    <div class="grid">
        <!-- TransLink -->
        <div class="card">
            <div class="logo-container">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/12/TransLink_logo.svg/512px-TransLink_logo.svg.png" alt="TransLink">
            </div>
            <div class="name">TransLink</div>
            <div class="loc">Vancouver</div>
        </div>

        <!-- STM -->
        <div class="card">
            <div class="logo-container">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Soci%C3%A9t%C3%A9_de_transport_de_Montr%C3%A9al_logo.svg/512px-Soci%C3%A9t%C3%A9_de_transport_de_Montr%C3%A9al_logo.svg.png" alt="STM">
            </div>
            <div class="name">STM</div>
            <div class="loc">Montreal</div>
        </div>

        <!-- ETS -->
        <div class="card">
            <div class="logo-container">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Edmonton_Transit_Service_logo.svg/512px-Edmonton_Transit_Service_logo.svg.png" alt="ETS">
            </div>
            <div class="name">ETS (Edmonton Transit)</div>
            <div class="loc">Edmonton</div>
        </div>

        <!-- Metrolinx -->
        <div class="card">
            <div class="logo-container">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cf/Metrolinx_logo.svg/512px-Metrolinx_logo.svg.png" alt="Metrolinx">
            </div>
            <div class="name">Metrolinx</div>
            <div class="loc">Toronto</div>
        </div>

        <!-- LACMTA (LA Metro) -->
        <div class="card">
            <div class="logo-container">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/LACMTA_Metro_logo.svg/512px-LACMTA_Metro_logo.svg.png" alt="LACMTA">
            </div>
            <div class="name">LACMTA (Metro)</div>
            <div class="loc">Los Ángeles</div>
        </div>

        <!-- PATH -->
        <div class="card">
            <div class="logo-container">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/56/Port_Authority_Trans-Hudson_logo.svg/512px-Port_Authority_Trans-Hudson_logo.svg.png" alt="PATH">
            </div>
            <div class="name">PATH</div>
            <div class="loc">NY / NJ</div>
        </div>

        <!-- WMATA -->
        <div class="card">
            <div class="logo-container">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/WMATA_Metro_logo.svg/512px-WMATA_Metro_logo.svg.png" alt="WMATA">
            </div>
            <div class="name">WMATA (Metro)</div>
            <div class="loc">Washington D.C.</div>
        </div>

        <!-- Metro-North Railroad -->
        <div class="card">
            <div class="logo-container">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/MTA_Metro-North_Railroad_logo.svg/512px-MTA_Metro-North_Railroad_logo.svg.png" alt="Metro-North">
            </div>
            <div class="name">Metro-North Railroad</div>
            <div class="loc">Nueva York</div>
        </div>
    </div>
</div>

</body>
</html>
